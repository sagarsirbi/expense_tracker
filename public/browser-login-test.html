<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login Test - Browser Compatibility</title>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f9f9f9;
        }
        .success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .warning {
            background: #fff3cd;
            border-color: #ffeaa7;
            color: #856404;
        }
        .info {
            background: #d1ecf1;
            border-color: #b8daff;
            color: #0c5460;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
        .login-form {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            border: 2px solid #007bff;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
        .step {
            margin: 10px 0;
            padding: 10px;
            border-left: 4px solid #007bff;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Admin Login Test - Browser Edition</h1>
        <p><strong>Testing admin credentials:</strong> admin@demo.com / admin123</p>

        <div id="results"></div>

        <!-- Login Form -->
        <div class="login-form">
            <h3>🚀 Test Login Form</h3>
            <input type="email" id="loginEmail" value="admin@demo.com" placeholder="Email">
            <input type="password" id="loginPassword" value="admin123" placeholder="Password">
            <button onclick="testLogin()">Test Login</button>
            <button onclick="clearData()">Clear All Data</button>
            <div id="loginResult"></div>
        </div>

        <button onclick="runAllTests()">🔬 Run All Diagnostic Tests</button>
        <button onclick="createAdminUser()">👤 Create Admin User</button>
        <button onclick="viewStorageData()">📊 View Storage Data</button>
    </div>

    <script>
        // Verified working bcrypt hash for "admin123" (salt rounds: 12)
        const ADMIN_HASH = '$2b$12$a7Ykfheh2Co45uipU7N6ber0YbZIZdmp/8myp9et5Jv9o.U0.QXwO';

        function addResult(content, className = 'info') {
            const div = document.createElement('div');
            div.className = `test-section ${className}`;
            div.innerHTML = content;
            document.getElementById('results').appendChild(div);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function runAllTests() {
            clearResults();
            addResult('<h3>🔬 Starting Comprehensive Browser Tests</h3>', 'info');

            // Test 1: Environment Detection
            addResult(`
                <div class="step">
                    <h4>Step 1: Environment Detection</h4>
                    <p>✅ Browser Environment: ${typeof window !== 'undefined'}</p>
                    <p>✅ LocalStorage Available: ${typeof localStorage !== 'undefined'}</p>
                    <p>✅ bcryptjs CDN Loaded: ${typeof dcodeIO !== 'undefined' && dcodeIO.bcrypt}</p>
                </div>
            `, 'success');

            // Test 2: bcryptjs Library Test
            try {
                const bcrypt = dcodeIO.bcrypt;
                const testHash = await new Promise((resolve, reject) => {
                    bcrypt.hash('test123', 12, (err, hash) => {
                        if (err) reject(err);
                        else resolve(hash);
                    });
                });
                
                const isValid = await new Promise((resolve, reject) => {
                    bcrypt.compare('test123', testHash, (err, result) => {
                        if (err) reject(err);
                        else resolve(result);
                    });
                });

                addResult(`
                    <div class="step">
                        <h4>Step 2: bcryptjs Functionality Test</h4>
                        <p>✅ Hash Generation: Success</p>
                        <p>✅ Password Verification: ${isValid ? 'Success' : 'Failed'}</p>
                        <p><strong>Test Hash:</strong> <code>${testHash}</code></p>
                    </div>
                `, 'success');
            } catch (error) {
                addResult(`
                    <div class="step">
                        <h4>Step 2: bcryptjs Functionality Test</h4>
                        <p>❌ Error: ${error.message}</p>
                    </div>
                `, 'error');
            }

            // Test 3: Pre-computed Hash Verification
            try {
                const bcrypt = dcodeIO.bcrypt;
                const isValidPrecomputed = await new Promise((resolve, reject) => {
                    bcrypt.compare('admin123', ADMIN_HASH, (err, result) => {
                        if (err) reject(err);
                        else resolve(result);
                    });
                });

                addResult(`
                    <div class="step">
                        <h4>Step 3: Pre-computed Hash Verification</h4>
                        <p>✅ Admin Password Verification: ${isValidPrecomputed ? 'Success' : 'Failed'}</p>
                        <p><strong>Hash:</strong> <code>${ADMIN_HASH}</code></p>
                        <p><strong>Password:</strong> admin123</p>
                    </div>
                `, isValidPrecomputed ? 'success' : 'error');
            } catch (error) {
                addResult(`
                    <div class="step">
                        <h4>Step 3: Pre-computed Hash Verification</h4>
                        <p>❌ Error: ${error.message}</p>
                    </div>
                `, 'error');
            }

            // Test 4: Check Existing Users
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            addResult(`
                <div class="step">
                    <h4>Step 4: Current Users in Storage</h4>
                    <p><strong>Users Count:</strong> ${users.length}</p>
                    <pre>${JSON.stringify(users, null, 2)}</pre>
                </div>
            `, users.length > 0 ? 'success' : 'warning');

            // Test 5: Session Data
            const sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
            addResult(`
                <div class="step">
                    <h4>Step 5: Active Sessions</h4>
                    <p><strong>Sessions Count:</strong> ${sessions.length}</p>
                    <pre>${JSON.stringify(sessions, null, 2)}</pre>
                </div>
            `, 'info');
        }

        async function createAdminUser() {
            try {
                clearResults();
                addResult('<h3>👤 Creating Admin User (Force Recreate)</h3>', 'info');

                // Clear all existing users to ensure clean slate
                localStorage.removeItem('users');
                localStorage.removeItem('sessions');
                localStorage.removeItem('currentSession');
                
                // Create new admin user with correct verified hash
                const adminUser = {
                    id: 'user_admin_demo_' + Date.now(),
                    email: 'admin@demo.com',
                    password_hash: ADMIN_HASH,
                    display_name: 'Demo Admin',
                    role: 'admin',
                    is_active: true,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };

                const users = [adminUser];
                localStorage.setItem('users', JSON.stringify(users));

                addResult(`
                    <div class="step">
                        <h4>✅ Admin User Created Successfully</h4>
                        <p><strong>Email:</strong> admin@demo.com</p>
                        <p><strong>Password:</strong> admin123</p>
                        <p><strong>Role:</strong> admin</p>
                        <p><strong>ID:</strong> ${adminUser.id}</p>
                        <pre>${JSON.stringify(adminUser, null, 2)}</pre>
                    </div>
                `, 'success');

            } catch (error) {
                addResult(`
                    <div class="step">
                        <h4>❌ Failed to Create Admin User</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `, 'error');
            }
        }

        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const resultDiv = document.getElementById('loginResult');

            try {
                resultDiv.innerHTML = '<p>🔄 Testing login...</p>';

                // Step 1: Find user
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const user = users.find(u => u.email === email);

                if (!user) {
                    resultDiv.innerHTML = `
                        <div class="test-section error">
                            <h4>❌ Login Failed</h4>
                            <p><strong>Reason:</strong> User not found</p>
                            <p><strong>Email:</strong> ${email}</p>
                            <p><strong>Available users:</strong> ${users.length}</p>
                        </div>
                    `;
                    return;
                }

                // Step 2: Verify password
                const bcrypt = dcodeIO.bcrypt;
                const isValidPassword = await new Promise((resolve, reject) => {
                    bcrypt.compare(password, user.password_hash, (err, result) => {
                        if (err) reject(err);
                        else resolve(result);
                    });
                });

                if (!isValidPassword) {
                    resultDiv.innerHTML = `
                        <div class="test-section error">
                            <h4>❌ Login Failed</h4>
                            <p><strong>Reason:</strong> Invalid password</p>
                            <p><strong>Hash:</strong> ${user.password_hash}</p>
                        </div>
                    `;
                    return;
                }

                // Step 3: Create session
                const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const session = {
                    id: sessionId,
                    userId: user.id,
                    email: user.email,
                    role: user.role,
                    createdAt: new Date().toISOString(),
                    expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString() // 24 hours
                };

                // Save session
                const sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
                sessions.push(session);
                localStorage.setItem('sessions', JSON.stringify(sessions));
                localStorage.setItem('currentSession', sessionId);

                resultDiv.innerHTML = `
                    <div class="test-section success">
                        <h4>✅ Login Successful!</h4>
                        <p><strong>User:</strong> ${user.display_name}</p>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>Role:</strong> ${user.role}</p>
                        <p><strong>Session ID:</strong> ${sessionId}</p>
                        <p><strong>Expires:</strong> ${session.expiresAt}</p>
                    </div>
                `;

            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="test-section error">
                        <h4>❌ Login Error</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
            }
        }

        function viewStorageData() {
            clearResults();
            addResult('<h3>📊 Current Storage Data</h3>', 'info');

            const storageData = {
                users: JSON.parse(localStorage.getItem('users') || '[]'),
                sessions: JSON.parse(localStorage.getItem('sessions') || '[]'),
                currentSession: localStorage.getItem('currentSession'),
                expenses: JSON.parse(localStorage.getItem('expenses') || '[]'),
                budgets: JSON.parse(localStorage.getItem('budgets') || '[]')
            };

            Object.entries(storageData).forEach(([key, value]) => {
                addResult(`
                    <div class="step">
                        <h4>${key.toUpperCase()}</h4>
                        <pre>${JSON.stringify(value, null, 2)}</pre>
                    </div>
                `, 'info');
            });
        }

        function clearData() {
            if (confirm('Are you sure you want to clear all data?')) {
                ['users', 'sessions', 'currentSession', 'expenses', 'budgets'].forEach(key => {
                    localStorage.removeItem(key);
                });
                clearResults();
                addResult('<h3>🗑️ All data cleared!</h3>', 'warning');
            }
        }

        // Auto-run tests on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                addResult('<h3>🎯 Page loaded! Ready for testing.</h3>', 'success');
                addResult('<p>Click "Run All Diagnostic Tests" to begin comprehensive testing.</p>', 'info');
            }, 500);
        });
    </script>
</body>
</html>
